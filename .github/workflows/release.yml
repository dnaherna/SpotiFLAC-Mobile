name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag/name, e.g. v1.0.0"
        required: true
        default: "v1.0.0"

jobs:
  build-ios:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.1.1.app
          xcodebuild -version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache-dependency-path: go_backend/go.sum

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          gomobile init

      - name: Build Go backend for iOS
        working-directory: go_backend
        run: |
          mkdir -p ../ios/Frameworks
          gomobile bind -target=ios -tags ios -o ../ios/Frameworks/Gobackend.xcframework .
        env:
          CGO_ENABLED: 1

      - name: Verify XCFramework created
        run: |
          ls -la ios/Frameworks/
          ls -la ios/Frameworks/Gobackend.xcframework/

      - name: Add XCFramework to Xcode project
        run: |
          sudo gem install xcodeproj

          cat > add_framework.rb << 'EOF'
          require 'xcodeproj'

          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)

          target = project.targets.find { |t| t.name == 'Runner' }

          frameworks_group = project.main_group.find_subpath('Frameworks', true)
          frameworks_group ||= project.main_group.new_group('Frameworks')

          framework_path = 'Frameworks/Gobackend.xcframework'
          framework_ref = frameworks_group.new_file(framework_path, :project)

          target.frameworks_build_phase.add_file_reference(framework_ref)

          embed_phase = target.build_phases.find do |p|
            p.is_a?(Xcodeproj::Project::Object::PBXCopyFilesBuildPhase) &&
            p.name == 'Embed Frameworks'
          end

          if embed_phase
            build_file = embed_phase.add_file_reference(framework_ref)
            build_file.settings = {
              'ATTRIBUTES' => ['CodeSignOnCopy', 'RemoveHeadersOnCopy']
            }
          end

          project.save
          puts "Successfully added Gobackend.xcframework"
          EOF

          ruby add_framework.rb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Normalize ffmpeg plugin shell scripts
        run: |
          find "$HOME/.pub-cache/hosted" -path "*ffmpeg_kit_flutter_new_full*/scripts/*.sh" -type f -print0 |
            while IFS= read -r -d '' f; do
              perl -pi -e 's/\r$//' "$f"
              chmod +x "$f"
              echo "Normalized: $f"
            done

      - name: Generate app icons
        run: dart run flutter_launcher_icons

      - name: Build iOS unsigned archive
        run: |
          flutter build ios --release --no-codesign --config-only

          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Create unsigned IPA
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p build/ios/ipa

          cd ios/build/Runner.xcarchive/Products/Applications
          mkdir Payload
          cp -r Runner.app Payload/

          zip -r "$GITHUB_WORKSPACE/build/ios/ipa/SpotiFLAC-${VERSION}-ios-unsigned.ipa" Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/ipa/*.ipa
